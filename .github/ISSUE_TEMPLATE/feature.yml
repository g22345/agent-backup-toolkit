name: Feature request
description: Propose a bounded, security-compatible improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainable user problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and recovery impact
      description: Explain effects on encryption, credentials, read-back, and restore safety.
    validations:
      required: true
  - type: checkboxes
    id: guarantees
    attributes:
      label: Safety compatibility
      options:
        - label: This does not require plaintext destination data.
          required: true
        - label: This does not require secret values in config or logs.
          required: true
        - label: This does not make restore delete target files.
          required: true

