name: Bug report
description: Report a reproducible non-security defect using synthetic data
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not post vulnerabilities, credentials, private identities, provider output,
        real backup artifacts, or private paths. Use Security → Report a vulnerability.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Minimal commands and synthetic config/data only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Redact paths, repository/bucket names, command output, and credentials.
    validations:
      required: true

